name: Build docs for GitHub Pages

# 与 GitHub Pages「Deploy from branch → master → /docs」配置配套
on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static site into docs/
        run: npm run build:pages
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Commit docs/ to master
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: master
          single-commit: true
          clean: true
